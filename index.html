<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Final</title>

<style>
body{
margin:0;
background:#f2f2f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
header{
padding:30px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:26px;
font-weight:700;
}

.nav{
display:flex;
gap:10px;
}

.nav button{
border:none;
background:#e5e5ea;
padding:6px 14px;
border-radius:14px;
cursor:pointer;
}

.nav button.active{
background:black;
color:white;
}

.wallet-actions{
display:flex;
gap:8px;
}

.icon-btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:black;
color:white;
cursor:pointer;
font-size:16px;
}

/* VIEW */
.view{display:none;}
.view.active{display:block;}

/* WALLET */
.stack{
padding:10px 0 120px 0;
}

.card{
width:90%;
margin:0 auto 16px auto;
border-radius:24px;
padding:20px;
box-sizing:border-box;
cursor:pointer;
position:relative;
transition:.3s;
}

.card h3{margin:0;}

.date,.time{
font-size:13px;
opacity:.6;
margin-top:4px;
}

.memo{
opacity:0;
max-height:0;
overflow:hidden;
transition:.3s;
margin-top:10px;
font-size:14px;
}

.card.active .memo{
opacity:1;
max-height:150px;
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
border:none;
background:rgba(0,0,0,0.1);
width:26px;
height:26px;
border-radius:50%;
cursor:pointer;
}

/* FORM */
.form-panel{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
border-radius:30px 30px 0 0;
padding:25px;
box-shadow:0 -10px 40px rgba(0,0,0,.15);
transition:.4s;
}

.form-panel.show{bottom:0;}

.form-panel input,
.form-panel textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

.form-panel textarea{
height:80px;
resize:none;
}

.form-panel button{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:black;
color:white;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.widget{
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.full{grid-column:1/3;}

.done{
text-decoration:line-through;
opacity:.5;
}

.clock{
font-size:24px;
font-weight:600;
}
</style>
</head>
<body>

<header>
<div class="title">Calendar</div>

<div class="nav">
<button onclick="switchView('wallet')" id="walletBtn" class="active">Wallet</button>
<button onclick="switchView('dashboard')" id="dashBtn">Dashboard</button>
</div>

<div class="wallet-actions" id="walletActions">
<button class="icon-btn" onclick="togglePast()">⏱</button>
<button class="icon-btn" onclick="openForm()">+</button>
</div>
</header>

<!-- WALLET -->
<div id="walletView" class="view active">
<div class="stack" id="stack"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboardView" class="view">
<div class="dashboard">

<div class="widget full">
<div class="clock" id="clock"></div>
<div id="dateText"></div>
</div>

<div class="widget">
<h3>오늘 일정</h3>
<div id="todayList"></div>
</div>

<div class="widget">
<h3>할일</h3>
<div id="todoList"></div>
<input id="todoInput" placeholder="할일 추가">
<button onclick="addTodo()">추가</button>
</div>

<div class="widget full">
<h3>오늘 체크리스트</h3>
<div id="checkList"></div>
<input id="checkInput" placeholder="체크 항목 추가">
<button onclick="addCheck()">추가</button>
</div>

</div>
</div>

<!-- FORM -->
<div class="form-panel" id="formPanel">
<input type="text" id="titleInput" placeholder="일정 제목">
<input type="date" id="dateInput">
<input type="time" id="timeInput">
<textarea id="memoInput" placeholder="메모"></textarea>
<button onclick="saveCard()">저장</button>
</div>

<script>
const colors=["#e6edf7","#ece7f6","#f6e9e9","#e8f3f0","#f4f1e8"];

let cards=JSON.parse(localStorage.getItem("cards"))||[];
let todos=JSON.parse(localStorage.getItem("todos"))||[];
let dailyChecklist=JSON.parse(localStorage.getItem("dailyChecklist"))||[];
let showPast=false;

/* 저장 */
function saveAll(){
localStorage.setItem("cards",JSON.stringify(cards));
localStorage.setItem("todos",JSON.stringify(todos));
localStorage.setItem("dailyChecklist",JSON.stringify(dailyChecklist));
}

/* 7일 자동 정리 */
function cleanupOldItems(){
const now=new Date();
const seven=7*24*60*60*1000;

todos=todos.filter(t=>{
if(!t.done)return true;
if(!t.completedAt)return true;
return (now-new Date(t.completedAt))<seven;
});

cards=cards.filter(c=>{
const eventDate=new Date(c.date+"T"+(c.time||"00:00"));
return (now-eventDate)<seven;
});
}

/* VIEW */
function switchView(view){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(view+"View").classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(view==="wallet"?"walletBtn":"dashBtn").classList.add("active");

document.getElementById("walletActions").style.display=
view==="wallet"?"flex":"none";

renderAll();
}

/* WALLET */
function renderWallet(){
const stack=document.getElementById("stack");
stack.innerHTML="";

let filtered=cards.filter(c=>{
const isPast=new Date(c.date+"T"+(c.time||"00:00"))<new Date();
return showPast?isPast:!isPast;
});

filtered.forEach((card,index)=>{
const div=document.createElement("div");
div.className="card";
div.style.background=card.color;

div.innerHTML=`
<button class="delete-btn">✕</button>
<h3>${card.title}</h3>
<div class="date">${card.date}</div>
<div class="time">${card.time||""}</div>
<div class="memo">${card.memo||""}</div>
`;

div.onclick=()=>div.classList.toggle("active");

div.querySelector(".delete-btn").onclick=(e)=>{
e.stopPropagation();
cards.splice(index,1);
renderAll();
};

stack.appendChild(div);
});
}

function togglePast(){
showPast=!showPast;
renderWallet();
}

function openForm(){
document.getElementById("formPanel").classList.add("show");
}

function saveCard(){
const title=document.getElementById("titleInput").value.trim();
const date=document.getElementById("dateInput").value;
const time=document.getElementById("timeInput").value||"00:00";
const memo=document.getElementById("memoInput").value.trim();
if(!title||!date)return;

cards.unshift({
title,date,time,memo,
color:colors[Math.floor(Math.random()*colors.length)]
});

document.getElementById("formPanel").classList.remove("show");
document.getElementById("titleInput").value="";
document.getElementById("dateInput").value="";
document.getElementById("timeInput").value="";
document.getElementById("memoInput").value="";
renderAll();
}

/* DASHBOARD */
function renderDashboard(){
updateClock();

const todayList=document.getElementById("todayList");
todayList.innerHTML="";
const today=new Date().toDateString();
cards.forEach(c=>{
if(new Date(c.date).toDateString()===today){
todayList.innerHTML+=`<div>${c.title}</div>`;
}
});

const todoList=document.getElementById("todoList");
todoList.innerHTML="";
todos.forEach((t,i)=>{
todoList.innerHTML+=`
<div class="${t.done?'done':''}">
${t.text}
<input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})">
</div>`;
});

const checkList=document.getElementById("checkList");
checkList.innerHTML="";
dailyChecklist.forEach((c,i)=>{
checkList.innerHTML+=`
<div class="${c.done?'done':''}">
${c.text}
<input type="checkbox" ${c.done?'checked':''} onchange="toggleCheck(${i})">
</div>`;
});
}

function renderAll(){
cleanupOldItems();
renderWallet();
renderDashboard();
saveAll();
}

/* TODO */
function addTodo(){
const val=document.getElementById("todoInput").value.trim();
if(!val)return;
todos.push({text:val,done:false});
document.getElementById("todoInput").value="";
renderAll();
}

function toggleTodo(i){
todos[i].done=!todos[i].done;
if(todos[i].done){
todos[i].completedAt=new Date().toISOString();
}else{
delete todos[i].completedAt;
}
renderAll();
}

function addCheck(){
const val=document.getElementById("checkInput").value.trim();
if(!val)return;
dailyChecklist.push({text:val,done:false});
document.getElementById("checkInput").value="";
renderAll();
}

function toggleCheck(i){
dailyChecklist[i].done=!dailyChecklist[i].done;
renderAll();
}

/* CLOCK */
function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString();
document.getElementById("dateText").innerText=
now.toLocaleDateString("ko-KR",{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

setInterval(updateClock,1000);

renderAll();
</script>

</body>
</html>
