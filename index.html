<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendaer</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  padding:20px;
}

h1 {
  text-align:center;
  margin-bottom:5px;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.mode-title {
  text-align:center;
  font-weight:600;
  margin-bottom:10px;
}

button {
  padding:10px;
  border-radius:12px;
  border:none;
  font-weight:600;
}

input, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}

textarea {
  resize:none;
  height:80px;
}

.card {
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.card.expanded {
  transform:scale(1.02);
}

.card small {
  opacity:0.8;
}

.detail {
  margin-top:10px;
  display:none;
}

.card.expanded .detail {
  display:block;
}

.delete-btn {
  background:white;
  color:black;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Calendaer</h1>
  <button onclick="togglePast()">🗂️</button>
</div>

<div id="modeTitle" class="mode-title"></div>

<div>
  <label>날짜 선택</label>
  <input type="date" id="date">
  
  <label>시간 선택 (24시간제)</label>
  <input type="time" id="time">
  
  <label>제목</label>
  <input type="text" id="title" placeholder="일정 제목">
  
  <label>메모</label>
  <textarea id="memo" placeholder="메모 입력"></textarea>
  
  <button onclick="addSchedule()">추가</button>
</div>

<hr>

<div id="scheduleList"></div>

<script>
let schedules = JSON.parse(localStorage.getItem("schedules") || "[]");
let showPast = false;

const colors = [
"#0A84FF","#30D158","#FF9F0A","#FF375F",
"#BF5AF2","#64D2FF","#FF453A","#32D74B"
];

function randomColor(){
  return colors[Math.floor(Math.random()*colors.length)];
}

function save(){
  localStorage.setItem("schedules", JSON.stringify(schedules));
}

function addSchedule(){
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const title = document.getElementById("title").value;
  const memo = document.getElementById("memo").value;

  if(!date || !time || !title) return;

  schedules.push({
    id:Date.now(),
    date,time,title,memo,
    color:randomColor()
  });

  save();
  render();
}

function deleteSchedule(id){
  schedules = schedules.filter(s=>s.id!==id);
  save();
  render();
}

function togglePast(){
  showPast = !showPast;
  render();
}

function render(){
  const list = document.getElementById("scheduleList");
  const modeTitle = document.getElementById("modeTitle");
  list.innerHTML="";

  const now = new Date();
  const todayString = now.toLocaleDateString("ko-KR", {
    year:"numeric", month:"long", day:"numeric", weekday:"long"
  });

  if(showPast){
    modeTitle.innerText="지난 일정";
  } else {
    modeTitle.innerText=todayString;
  }

  schedules
  .sort((a,b)=> new Date(a.date+" "+a.time) - new Date(b.date+" "+b.time))
  .forEach(s=>{
    const scheduleDate = new Date(s.date+" "+s.time);
    const isPast = scheduleDate < now;

    if(showPast !== isPast) return;

    const remainMs = scheduleDate - now;
    let remainText="";
    if(!isPast){
      const hours = Math.floor(remainMs/1000/60/60);
      remainText = ` · ${hours}시간 남음`;
    }

    const card = document.createElement("div");
    card.className="card";
    card.style.background=s.color;

    card.innerHTML=`
      <div>
        <strong>${s.time}</strong> ${s.title}
        <small>${remainText}</small>
      </div>
      <div class="detail">
        <p>${s.memo||""}</p>
        <button class="delete-btn" onclick="event.stopPropagation();deleteSchedule(${s.id})">삭제</button>
      </div>
    `;

    card.onclick=()=>{
      card.classList.toggle("expanded");
    };

    list.appendChild(card);
  });
}

render();
</script>

</body>
</html>
