<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Calendar</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f2f2f7;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  font-weight:600;
  font-size:20px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.container{
  padding:15px;
}

.card{
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  transition:0.25s;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.card-title{
  font-weight:600;
  font-size:16px;
}

.card-time{
  font-size:13px;
  opacity:0.6;
}

.card-body{
  margin-top:12px;
  display:none;
  font-size:14px;
  opacity:0.85;
}

.delete-btn{
  margin-top:12px;
  color:#ff3b30;
  font-size:13px;
  cursor:pointer;
}

.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:black;
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  border-radius:24px;
  padding:22px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

.save-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:16px;
  background:black;
  color:white;
  font-size:15px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>
  일정
  <div class="menu-btn" onclick="togglePast()">☰</div>
</header>

<div class="container" id="activeList"></div>
<div class="container hidden" id="pastList"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>새 일정</h3>
    <input type="text" id="title" placeholder="제목">
    <input type="date" id="date">
    <input type="time" id="time">
    <textarea id="memo" placeholder="메모"></textarea>
    <button class="save-btn" onclick="saveEvent()">저장</button>
  </div>
</div>

<script>
let events = JSON.parse(localStorage.getItem("events") || "[]");

const pastelColors = [
"#FFD6E0","#FFE5B4","#FFF3B0","#E0F7FA","#D0F0C0",
"#E8EAF6","#F3E5F5","#FDE2E4","#E4F9F5","#F9FBE7",
"#FCE4EC","#E1F5FE","#FFF8E1","#EDE7F6","#E8F5E9",
"#FBE9E7","#F1F8E9","#E3F2FD","#FFF0F6","#F0F4FF"
];

function saveToStorage(){
  localStorage.setItem("events",JSON.stringify(events));
}

function render(){
  const now = new Date();
  const activeList = document.getElementById("activeList");
  const pastList = document.getElementById("pastList");

  activeList.innerHTML="";
  pastList.innerHTML="";

  events.forEach((e,i)=>{
    const eventDate = new Date(e.date+"T"+e.time);
    const isPast = eventDate < now;

    const card = document.createElement("div");
    card.className="card";
    card.style.background = e.color;

    card.innerHTML=`
      <div class="card-header" onclick="toggleBody(this)">
        <div>
          <div class="card-title">${e.title}</div>
          <div class="card-time">${e.date} ${e.time}</div>
        </div>
      </div>
      <div class="card-body">
        ${e.memo || ""}
        <div class="delete-btn" onclick="deleteEvent(${i})">삭제</div>
      </div>
    `;

    if(isPast){
      pastList.appendChild(card);
    }else{
      activeList.appendChild(card);
    }
  });
}

function toggleBody(el){
  const body = el.parentElement.querySelector(".card-body");
  body.style.display = body.style.display==="block"?"none":"block";
}

function deleteEvent(i){
  events.splice(i,1);
  saveToStorage();
  render();
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function saveEvent(){
  const title=document.getElementById("title").value;
  const date=document.getElementById("date").value;
  const time=document.getElementById("time").value;
  const memo=document.getElementById("memo").value;

  if(!title || !date || !time) return;

  const randomColor = pastelColors[Math.floor(Math.random()*pastelColors.length)];

  events.push({title,date,time,memo,color:randomColor});
  saveToStorage();
  document.getElementById("modal").style.display="none";
  render();
}

function togglePast(){
  document.getElementById("pastList").classList.toggle("hidden");
}

render();
</script>

</body>
</html>
