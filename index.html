<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar</title>

<style>
body{
margin:0;
background:#f2f2f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
padding:40px 20px 10px 20px;
font-size:34px;
font-weight:700;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions{
display:flex;
gap:10px;
}

.icon-btn{
width:40px;
height:40px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
background:#111;
color:white;
font-size:18px;
}

.stack{
padding:10px 0 150px 0;
}

.card{
width:90%;
margin:0 auto 16px auto;
border-radius:26px;
padding:22px;
box-sizing:border-box;
transition:all .45s cubic-bezier(.22,.61,.36,1);
cursor:pointer;
position:relative;
}

.card h2{
margin:0;
font-size:20px;
font-weight:700;
}

.date{
font-size:14px;
opacity:.6;
margin-top:6px;
}

.memo{
margin-top:14px;
font-size:14px;
line-height:1.5;
opacity:0;
max-height:0;
overflow:hidden;
transition:.4s;
}

.time{
font-size:13px;
margin-top:4px;
opacity:.7;
}

.delete-btn{
margin-top:18px;
padding:8px 14px;
border-radius:14px;
border:none;
background:#ff3b30;
color:white;
font-size:13px;
opacity:0;
}

.card.active{
transform:scale(1.04);
margin-top:30px;
margin-bottom:30px;
}

.card.active .memo{
opacity:1;
max-height:300px;
}

.card.active .delete-btn{
opacity:1;
}

.dimmed{
opacity:.35;
transform:translateY(20px);
}

.form-panel{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:white;
border-radius:30px 30px 0 0;
padding:25px;
box-shadow:0 -10px 40px rgba(0,0,0,.15);
transition:.5s cubic-bezier(.22,.61,.36,1);
}

.form-panel.show{
bottom:0;
}

.form-panel input,
.form-panel textarea{
width:100%;
margin-bottom:12px;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
box-sizing:border-box;
}

.form-panel button{
width:100%;
padding:12px;
border-radius:14px;
border:none;
background:black;
color:white;
font-size:15px;
}

</style>
</head>
<body>

<header>
<span>Calendar</span>
<div class="actions">
<div class="icon-btn" onclick="togglePast()">⏱</div>
<div class="icon-btn" onclick="openForm()">+</div>
</div>
</header>

<div class="stack" id="stack"></div>

<div class="form-panel" id="formPanel">
<input type="text" id="titleInput" placeholder="일정 제목">
<input type="date" id="dateInput">
<input type="time" id="timeInput">
<textarea id="memoInput" placeholder="메모"></textarea>
<button onclick="saveCard()">저장</button>
</div>

<script>

const colors=[
"#e6edf7",
"#ece7f6",
"#f6e9e9",
"#e8f3f0",
"#f4f1e8"
];

let showPast=false;
let activeIndex=null;

let cards=[];

function requestNotification(){
if(Notification.permission!=="granted"){
Notification.requestPermission();
}
}

requestNotification();

function scheduleNotification(card){
if(Notification.permission!=="granted") return;

const eventTime=new Date(card.date+"T"+card.time);
const now=new Date();
const delay=eventTime-now;

if(delay>0){
setTimeout(()=>{
new Notification("일정 알림",{
body:card.title+" 일정 시간입니다."
});
},delay);
}
}

function isPast(date,time){
return new Date(date+"T"+time) < new Date();
}

function render(){
const stack=document.getElementById("stack");
stack.innerHTML="";

let filtered=cards.filter(c=>showPast?isPast(c.date,c.time):!isPast(c.date,c.time));

filtered.forEach((card,index)=>{
const div=document.createElement("div");
div.className="card";
if(activeIndex===index) div.classList.add("active");
if(activeIndex!==null && activeIndex!==index) div.classList.add("dimmed");

div.style.background=card.color;

div.innerHTML=`
<h2>${card.title}</h2>
<div class="date">${card.date}</div>
<div class="time">${card.time}</div>
<div class="memo">${card.memo}</div>
<button class="delete-btn" onclick="deleteCard(event, ${cards.indexOf(card)})">삭제</button>
`;

div.onclick=()=>toggleCard(index);
stack.appendChild(div);
});
}

function toggleCard(index){
activeIndex=(activeIndex===index)?null:index;
render();
}

function togglePast(){
showPast=!showPast;
activeIndex=null;
render();
}

function deleteCard(event,index){
event.stopPropagation();
cards.splice(index,1);
activeIndex=null;
render();
}

function openForm(){
document.getElementById("formPanel").classList.add("show");
}

function saveCard(){
const title=document.getElementById("titleInput").value;
const date=document.getElementById("dateInput").value;
const time=document.getElementById("timeInput").value;
const memo=document.getElementById("memoInput").value;

if(!title||!date||!time) return;

const newCard={
title,
date,
time,
memo,
color:colors[Math.floor(Math.random()*colors.length)]
};

cards.unshift(newCard);
scheduleNotification(newCard);

document.getElementById("formPanel").classList.remove("show");
document.getElementById("titleInput").value="";
document.getElementById("dateInput").value="";
document.getElementById("timeInput").value="";
document.getElementById("memoInput").value="";
render();
}

render();

</script>
</body>
</html>
