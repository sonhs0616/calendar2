<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendaer</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f2f2f7;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin:0;
}

.mode-title{
  text-align:center;
  font-weight:600;
  margin:10px 0 15px 0;
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}

textarea{
  resize:none;
  height:80px;
}

button{
  padding:10px;
  border-radius:12px;
  border:none;
  font-weight:600;
}

.card{
  border-radius:22px;
  padding:18px;
  margin-bottom:15px;
  color:white;
  cursor:pointer;
  transition:0.25s ease;
}

.card.expanded{
  transform:scale(1.02);
}

.detail{
  display:none;
  margin-top:10px;
}

.card.expanded .detail{
  display:block;
}

.delete-btn{
  background:white;
  color:black;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <h1>Calendaer</h1>
  <button onclick="togglePast()">🗂️</button>
</div>

<div id="modeTitle" class="mode-title"></div>

<label>날짜 선택</label>
<input type="date" id="date">

<label>시간 선택 (24시간제)</label>
<input type="time" id="time">

<label>제목</label>
<input type="text" id="title" placeholder="일정 제목">

<label>메모</label>
<textarea id="memo" placeholder="메모 입력"></textarea>

<button onclick="addSchedule()">저장</button>

<hr>

<div id="scheduleList"></div>

<script>
let schedules = JSON.parse(localStorage.getItem("schedules") || "[]");
let showPast = false;

const colors = [
"#0A84FF","#30D158","#FF9F0A","#FF375F",
"#BF5AF2","#64D2FF","#FF453A","#32D74B"
];

function randomColor(){
  return colors[Math.floor(Math.random()*colors.length)];
}

function save(){
  localStorage.setItem("schedules", JSON.stringify(schedules));
}

function addSchedule(){
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const title = document.getElementById("title").value.trim();
  const memo = document.getElementById("memo").value.trim();

  if(!date || !time || !title){
    alert("날짜, 시간, 제목은 필수입니다.");
    return;
  }

  schedules.push({
    id:Date.now(),
    date,
    time,
    title,
    memo,
    color:randomColor()
  });

  save();
  clearInput();
  render();
}

function clearInput(){
  document.getElementById("title").value="";
  document.getElementById("memo").value="";
}

function deleteSchedule(id){
  schedules = schedules.filter(s=>s.id!==id);
  save();
  render();
}

function togglePast(){
  showPast = !showPast;
  render();
}

function render(){
  const list = document.getElementById("scheduleList");
  const modeTitle = document.getElementById("modeTitle");
  list.innerHTML="";

  const now = new Date();
  const todayText = now.toLocaleDateString("ko-KR",{
    year:"numeric",
    month:"long",
    day:"numeric",
    weekday:"long"
  });

  modeTitle.innerText = showPast ? "지난 일정" : todayText;

  schedules
  .sort((a,b)=>{
    const da = new Date(a.date+"T"+a.time);
    const db = new Date(b.date+"T"+b.time);
    return da - db;
  })
  .forEach(s=>{
    const scheduleDate = new Date(s.date+"T"+s.time);
    const isPast = scheduleDate < now;

    if(showPast !== isPast) return;

    let remainText="";
    if(!isPast){
      const diff = scheduleDate - now;
      const hours = Math.floor(diff/1000/60/60);
      remainText = hours>0 ? ` · ${hours}시간 남음` : " · 곧 시작";
    }

    const card = document.createElement("div");
    card.className="card";
    card.style.background=s.color;

    card.innerHTML=`
      <div>
        <strong>${s.time}</strong> ${s.title}
        <small>${remainText}</small>
      </div>
      <div class="detail">
        <p>${s.memo || ""}</p>
        <button class="delete-btn"
          onclick="event.stopPropagation();deleteSchedule(${s.id})">
          삭제
        </button>
      </div>
    `;

    card.onclick=()=>{
      card.classList.toggle("expanded");
    };

    list.appendChild(card);
  });
}

render();
</script>

</body>
</html>
