<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar</title>

<style>
body {
  margin: 0;
  background: #f2f2f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

header {
  padding: 40px 20px 10px 20px;
  font-size: 34px;
  font-weight: 700;
}

.add-btn {
  position: fixed;
  right: 20px;
  top: 45px;
  font-size: 26px;
  background: black;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

.stack {
  padding: 10px 0 150px 0;
}

.card {
  width: 90%;
  height: 140px;
  margin: 0 auto -90px auto;
  border-radius: 28px;
  padding: 22px;
  box-sizing: border-box;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  transition: all 0.45s cubic-bezier(.25,.8,.25,1);
  cursor: pointer;
  position: relative;
  background: white;
}

.card h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
}

.card .date {
  font-size: 14px;
  opacity: 0.6;
  margin-top: 6px;
}

.card.active {
  margin: 20px auto;
  height: auto;
  z-index: 999;
  transform: scale(1.02);
}

.memo {
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.5;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: all 0.4s ease;
}

.card.active .memo {
  opacity: 1;
  max-height: 300px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

</style>
</head>
<body>

<header>Calendar</header>
<div class="add-btn" onclick="addCard()">+</div>
<div class="overlay" id="overlay" onclick="closeCard()"></div>
<div class="stack" id="stack"></div>

<script>

let cards = [
  { title: "Workout", date: "2026-02-26", memo: "하체 + 유산소 30분", color: "#ffffff" },
  { title: "Team Meeting", date: "2026-02-27", memo: "프로젝트 진행 상황 공유", color: "#ffffff" },
  { title: "Presentation", date: "2026-02-28", memo: "발표 자료 최종 점검", color: "#ffffff" }
];

let activeIndex = null;

function render() {
  const stack = document.getElementById("stack");
  stack.innerHTML = "";

  cards.forEach((card, index) => {
    const div = document.createElement("div");
    div.className = "card";
    if (activeIndex === index) div.classList.add("active");

    div.innerHTML = `
      <h2>${card.title}</h2>
      <div class="date">${card.date}</div>
      <div class="memo">${card.memo}</div>
    `;

    div.onclick = () => openCard(index);
    stack.appendChild(div);
  });
}

function openCard(index) {
  activeIndex = index;
  document.getElementById("overlay").classList.add("show");
  render();
}

function closeCard() {
  activeIndex = null;
  document.getElementById("overlay").classList.remove("show");
  render();
}

function addCard() {
  const title = prompt("일정 제목");
  const date = prompt("날짜 (YYYY-MM-DD)");
  const memo = prompt("메모 내용");
  if (!title || !date) return;

  cards.unshift({
    title,
    date,
    memo: memo || "",
    color: "#ffffff"
  });

  render();
}

render();

</script>

</body>
</html>
