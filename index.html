<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body{
margin:0;
background:#f2f2f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
padding:30px 20px 10px 20px;
font-size:28px;
font-weight:700;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav{
display:flex;
gap:10px;
}

.nav button{
border:none;
background:#e5e5ea;
padding:6px 14px;
border-radius:14px;
cursor:pointer;
}

.nav button.active{
background:black;
color:white;
}

.view{
display:none;
}

.view.active{
display:block;
}

/* Wallet */

.stack{
padding:10px 0 120px 0;
}

.card{
width:90%;
margin:0 auto 16px auto;
border-radius:24px;
padding:20px;
box-sizing:border-box;
transition:.4s cubic-bezier(.22,.61,.36,1);
cursor:pointer;
}

.card.active{
transform:scale(1.05);
}

.memo{
opacity:0;
max-height:0;
overflow:hidden;
transition:.3s;
margin-top:10px;
font-size:14px;
}

.card.active .memo{
opacity:1;
max-height:150px;
}

/* Dashboard */

.dashboard{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.widget{
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.full{
grid-column:1/3;
}

.widget h3{
margin:0 0 10px 0;
font-size:16px;
}

.todo-item, .check-item{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:8px;
font-size:14px;
}

.done{
text-decoration:line-through;
opacity:.5;
}

.clock{
font-size:24px;
font-weight:600;
}

.date-text{
opacity:.6;
font-size:14px;
margin-top:4px;
}

input[type="text"]{
width:100%;
padding:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:13px;
margin-top:6px;
}

button.small{
margin-top:6px;
padding:6px 10px;
border:none;
border-radius:10px;
background:black;
color:white;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<span>Calendar</span>
<div class="nav">
<button onclick="switchView('wallet')" id="walletBtn" class="active">Wallet</button>
<button onclick="switchView('dashboard')" id="dashBtn">Dashboard</button>
</div>
</header>

<!-- Wallet View -->
<div id="walletView" class="view active">
<div class="stack" id="stack"></div>
</div>

<!-- Dashboard View -->
<div id="dashboardView" class="view">
<div class="dashboard">

<div class="widget full">
<div class="clock" id="clock"></div>
<div class="date-text" id="dateText"></div>
</div>

<div class="widget">
<h3>오늘 일정</h3>
<div id="todayList"></div>
</div>

<div class="widget">
<h3>할일</h3>
<div id="todoList"></div>
<input type="text" id="todoInput" placeholder="할일 추가">
<button class="small" onclick="addTodo()">추가</button>
</div>

<div class="widget full">
<h3>오늘 체크리스트</h3>
<div id="checkList"></div>
<input type="text" id="checkInput" placeholder="체크 항목 추가">
<button class="small" onclick="addCheck()">추가</button>
</div>

</div>
</div>

<script>

const colors=["#e6edf7","#ece7f6","#f6e9e9","#e8f3f0","#f4f1e8"];

let cards=JSON.parse(localStorage.getItem("cards"))||[];
let todos=JSON.parse(localStorage.getItem("todos"))||[];
let dailyChecklist=JSON.parse(localStorage.getItem("dailyChecklist"))||[];

function saveAll(){
localStorage.setItem("cards",JSON.stringify(cards));
localStorage.setItem("todos",JSON.stringify(todos));
localStorage.setItem("dailyChecklist",JSON.stringify(dailyChecklist));
}

function switchView(view){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(view+"View").classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(view==="wallet"?"walletBtn":"dashBtn").classList.add("active");
renderAll();
}

function renderWallet(){
const stack=document.getElementById("stack");
stack.innerHTML="";
cards.forEach((card,index)=>{
const div=document.createElement("div");
div.className="card";
div.style.background=card.color;
div.innerHTML=`<h3>${card.title}</h3>
<div>${card.date}</div>
<div class="memo">${card.memo||""}</div>`;
div.onclick=()=>div.classList.toggle("active");
stack.appendChild(div);
});
}

function renderDashboard(){
updateClock();

const todayList=document.getElementById("todayList");
todayList.innerHTML="";
const today=new Date().toDateString();
cards.forEach(c=>{
if(new Date(c.date).toDateString()===today){
todayList.innerHTML+=`<div style="font-size:14px;margin-bottom:6px;">${c.title}</div>`;
}
});

const todoList=document.getElementById("todoList");
todoList.innerHTML="";
todos.forEach((t,i)=>{
todoList.innerHTML+=`
<div class="todo-item ${t.done?'done':''}">
<span>${t.text}</span>
<input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})">
</div>`;
});

const checkList=document.getElementById("checkList");
checkList.innerHTML="";
dailyChecklist.forEach((c,i)=>{
checkList.innerHTML+=`
<div class="check-item ${c.done?'done':''}">
<span>${c.text}</span>
<input type="checkbox" ${c.done?'checked':''} onchange="toggleCheck(${i})">
</div>`;
});
}

function renderAll(){
renderWallet();
renderDashboard();
saveAll();
}

function addTodo(){
const val=document.getElementById("todoInput").value.trim();
if(!val)return;
todos.push({text:val,done:false});
document.getElementById("todoInput").value="";
renderAll();
}

function toggleTodo(i){
todos[i].done=!todos[i].done;
renderAll();
}

function addCheck(){
const val=document.getElementById("checkInput").value.trim();
if(!val)return;
dailyChecklist.push({text:val,done:false});
document.getElementById("checkInput").value="";
renderAll();
}

function toggleCheck(i){
dailyChecklist[i].done=!dailyChecklist[i].done;
renderAll();
}

function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString();
document.getElementById("dateText").innerText=
now.toLocaleDateString("ko-KR",{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

setInterval(updateClock,1000);

renderAll();

</script>

</body>
</html>
