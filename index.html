<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Calendar</title>

<style>
:root{
  --bg:#f2f2f7;
  --text:#111;
  --cardText:#111;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#000;
    --text:#fff;
    --cardText:#000;
  }
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header{
  padding:20px;
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
  font-weight:600;
}

.today{
  margin-top:6px;
  font-size:14px;
  opacity:0.6;
}

.history-btn{
  font-size:20px;
  cursor:pointer;
}

.container{
  padding:15px;
}

.card{
  border-radius:22px;
  padding:18px;
  margin-bottom:14px;
  transition:all 0.35s ease;
  overflow:hidden;
}

.card-title{
  font-weight:600;
  font-size:16px;
}

.card-time{
  font-size:13px;
  opacity:0.7;
}

.card-body{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.4s ease;
  margin-top:0;
  font-size:14px;
}

.card.expanded .card-body{
  max-height:200px;
  margin-top:12px;
}

.delete-btn{
  margin-top:10px;
  color:#ff3b30;
  font-size:13px;
  cursor:pointer;
}

.fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:#007aff;
  color:white;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  border-radius:24px;
  padding:22px;
}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

.save-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:16px;
  background:#007aff;
  color:white;
  font-size:15px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="top-row">
    일정
    <div class="history-btn" onclick="togglePast()">🕘</div>
  </div>
  <div class="today" id="todayDate"></div>
</header>

<div class="container" id="activeList"></div>
<div class="container hidden" id="pastList"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>새 일정</h3>
    <input type="text" id="title" placeholder="제목">
    <input type="date" id="date">
    <input type="time" id="time">
    <textarea id="memo" placeholder="메모"></textarea>
    <button class="save-btn" onclick="saveEvent()">저장</button>
  </div>
</div>

<script>
let events = JSON.parse(localStorage.getItem("events") || "[]");

const colors=[
"#FFD6E0","#FFE5B4","#FFF3B0","#E0F7FA","#D0F0C0",
"#E8EAF6","#F3E5F5","#FDE2E4","#E4F9F5","#F9FBE7",
"#FCE4EC","#E1F5FE","#FFF8E1","#EDE7F6","#E8F5E9"
];

function setToday(){
  const now=new Date();
  const formatted=now.toLocaleDateString("ko-KR",{
    year:"numeric",
    month:"long",
    day:"numeric",
    weekday:"long"
  });
  document.getElementById("todayDate").innerText=formatted;
}

function saveStorage(){
  localStorage.setItem("events",JSON.stringify(events));
}

function render(){
  const now=new Date();
  const active=document.getElementById("activeList");
  const past=document.getElementById("pastList");
  active.innerHTML="";
  past.innerHTML="";

  events.sort((a,b)=>{
    return new Date(a.date+"T"+a.time) - new Date(b.date+"T"+b.time);
  });

  events.forEach((e,i)=>{
    const eventDate=new Date(e.date+"T"+e.time);
    const isPast=eventDate<now;

    const card=document.createElement("div");
    card.className="card";
    card.style.background=e.color;
    card.style.color="var(--cardText)";
    card.onclick=()=>card.classList.toggle("expanded");

    card.innerHTML=`
      <div class="card-title">${e.title}</div>
      <div class="card-time">${e.date} ${e.time}</div>
      <div class="card-body">
        ${e.memo||""}
        <div class="delete-btn" onclick="event.stopPropagation();deleteEvent(${i})">삭제</div>
      </div>
    `;

    if(isPast) past.appendChild(card);
    else active.appendChild(card);
  });
}

function saveEvent(){
  const title=title.value;
  const date=date.value;
  const time=time.value;
  const memo=memo.value;

  if(!title||!date||!time) return;

  const color=colors[Math.floor(Math.random()*colors.length)];

  events.push({title,date,time,memo,color});
  saveStorage();
  modal.style.display="none";
  render();
}

function deleteEvent(i){
  events.splice(i,1);
  saveStorage();
  render();
}

function openModal(){
  modal.style.display="flex";
}

function togglePast(){
  pastList.classList.toggle("hidden");
}

setToday();
render();
</script>

</body>
</html>
